name: Build Nasie Live Report

on:
  push:
    paths:
      - 'data/Nasie_Maintenance.xlsx'
      - 'build_report.py'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build report
        run: |
          mkdir -p latest
          python build_report.py data/Nasie_Maintenance.xlsx latest
          DATESTAMP=$(date +%Y-%m-%d)
          mkdir -p "archive/$DATESTAMP"
          cp latest/index.html "archive/$DATESTAMP/index.html"

      - name: Commit & push generated report
        run: |
          git config user.name  "nasie-report-bot"
          git config user.email "actions@github.com"
          git add latest/ archive/ || true
          git commit -m "Auto-build report" || echo "no changes"
          git push
